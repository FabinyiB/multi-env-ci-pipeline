name: Multi-Environment CI Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Choose the target environment.'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - int
          - both
      testScope:
        description: 'Choose the test scope to run.'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - regression
          - both
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: '0 2 * * *'

jobs:
  run-tests-dev:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.environment == 'dev' || github.event.inputs.environment == 'both')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Start static app server
        run: |
          npm run start &
          npx wait-on http://localhost:3000

      - name: Run Cypress tests
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            SCOPE=smokepush" ]]; then
            SCOPE=smoke
          elif [[ "${{ github.event_name }}" == "
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            SCOPE=${{ github.event.inputs.testScope }}
          else
            SCOPE=smoke
          fi
          echo "Running $SCOPE tests against DEV"
          npm run test:dev:$SCOPE

  run-tests-int:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.environment == 'int' || github.event.inputs.environment == 'both')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Start static app server
        run: |
          npm run start &
          npx wait-on http://localhost:3000

      - name: Run Cypress tests
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            SCOPE=regression
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            SCOPE=regression
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            SCOPE=${{ github.event.inputs.testScope }}
          else
            SCOPE=regression
          fi
          echo "Running $SCOPE tests against INT"
          npm run test:int:$SCOPE
